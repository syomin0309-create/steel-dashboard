<svg xmlns="http://www.w3.org/2000/svg" viewBox="-16 -16 128 128" width="96" height="96">
  <!-- Outer ring -->
  <circle cx="48" cy="48" r="44" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Mid ring dashed -->
  <circle cx="48" cy="48" r="33" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4 3" opacity="0.45"/>
  <!-- Inner circle -->
  <circle cx="48" cy="48" r="22" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.2"/>

  <!-- 眐 character, slightly smaller -->
  <text x="48" y="48" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia, 'Microsoft JhengHei', serif"
    font-size="24" font-weight="700" fill="#0284c7">眐</text>

  <!-- Top: node extends upward past outer ring -->
  <line x1="48" y1="4" x2="48" y2="-10" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="48" y1="-10" x2="64" y2="-10" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="64" cy="-10" r="3" fill="#0ea5e9"/>

  <!-- Top right -->
  <line x1="79" y1="17" x2="94" y2="4" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="94" y1="4" x2="108" y2="4" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="108" cy="4" r="3" fill="#0ea5e9"/>

  <!-- Right -->
  <line x1="92" y1="48" x2="108" y2="48" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="108" y1="48" x2="108" y2="34" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="108" cy="34" r="3" fill="#0ea5e9"/>

  <!-- Bottom right -->
  <line x1="79" y1="79" x2="94" y2="92" stroke="#64748b" stroke-width="1.2"/>
  <circle cx="94" cy="92" r="2.5" fill="#64748b"/>

  <!-- Bottom -->
  <line x1="48" y1="92" x2="48" y2="108" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="48" y1="108" x2="32" y2="108" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="32" cy="108" r="3" fill="#0ea5e9"/>

  <!-- Bottom left -->
  <line x1="17" y1="79" x2="4" y2="92" stroke="#64748b" stroke-width="1.2"/>
  <circle cx="4" cy="92" r="2.5" fill="#64748b"/>

  <!-- Left -->
  <line x1="4" y1="48" x2="-10" y2="48" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="-10" y1="48" x2="-10" y2="64" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="-10" cy="64" r="3" fill="#0ea5e9"/>

  <!-- Top left -->
  <line x1="17" y1="17" x2="4" y2="4" stroke="#64748b" stroke-width="1.2"/>
  <line x1="4" y1="4" x2="-8" y2="4" stroke="#64748b" stroke-width="1.2"/>
  <circle cx="-8" cy="4" r="2.5" fill="#64748b"/>
</svg>
