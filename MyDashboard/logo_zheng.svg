<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Outer ring -->
  <circle cx="48" cy="48" r="44" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Mid ring dashed -->
  <circle cx="48" cy="48" r="33" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4 3" opacity="0.45"/>
  <!-- Inner circle -->
  <circle cx="48" cy="48" r="22" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.2"/>

  <!-- 眐 character -->
  <text x="48" y="48" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia, 'Microsoft JhengHei', serif"
    font-size="22" font-weight="700" fill="#0284c7">眐</text>

  <!-- Circuit nodes -->
  <!-- Top -->
  <line x1="48" y1="4" x2="48" y2="15" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="48" y1="4" x2="60" y2="4" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="60" cy="4" r="2.5" fill="#0ea5e9"/>

  <!-- Top right -->
  <line x1="78" y1="18" x2="88" y2="10" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="88" cy="10" r="2.5" fill="#0ea5e9"/>

  <!-- Right -->
  <line x1="92" y1="48" x2="82" y2="48" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="92" y1="48" x2="92" y2="36" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="92" cy="36" r="2.5" fill="#0ea5e9"/>

  <!-- Bottom right -->
  <line x1="78" y1="78" x2="88" y2="86" stroke="#64748b" stroke-width="1.2"/>
  <circle cx="88" cy="86" r="2.5" fill="#64748b"/>

  <!-- Bottom -->
  <line x1="48" y1="92" x2="48" y2="81" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="48" y1="92" x2="36" y2="92" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="36" cy="92" r="2.5" fill="#0ea5e9"/>

  <!-- Bottom left -->
  <line x1="18" y1="78" x2="8" y2="86" stroke="#64748b" stroke-width="1.2"/>
  <circle cx="8" cy="86" r="2.5" fill="#64748b"/>

  <!-- Left -->
  <line x1="4" y1="48" x2="14" y2="48" stroke="#0ea5e9" stroke-width="1.4"/>
  <line x1="4" y1="48" x2="4" y2="62" stroke="#0ea5e9" stroke-width="1.4"/>
  <circle cx="4" cy="62" r="2.5" fill="#0ea5e9"/>

  <!-- Top left -->
  <line x1="18" y1="18" x2="8" y2="10" stroke="#64748b" stroke-width="1.2"/>
  <circle cx="8" cy="10" r="2.5" fill="#64748b"/>
</svg>
